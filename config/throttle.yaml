dds:
  topic: "vehicle.analog_controls"
  type: "Gamepad::Gamepad_Analog"
  idl_file: "idl/Gamepad.idl"
  domain_id: 0

mapping:
  - name: throttle
    id: 2
    field: value
    to: axis:right_trigger
    scale: 1.0
    deadzone: 0.05
    invert: false
  - name: brake
    id: 1
    field: value
    to: axis:left_trigger
    scale: 1.0
    deadzone: 0.05
    invert: false
