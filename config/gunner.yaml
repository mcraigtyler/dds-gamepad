
role:
  name: "Gunner"
  yoke_id: 1004

mappings:
  # -------- Buttons (Gamepad::Button / Gamepad_Button) --------
  - name: fire_3
    dds:
      topic: "Gamepad_Button"
      type: "Gamepad::Button"
      idl_file: "idl/Gamepad.idl"
      id: 3
      field: btnState
    gamepad:
      to: button:a

  - name: fire_6
    dds:
      topic: "Gamepad_Button"
      type: "Gamepad::Button"
      idl_file: "idl/Gamepad.idl"
      id: 6
      field: btnState
    gamepad:
      to: button:a

  - name: swap_projectile
    dds:
      topic: "Gamepad_Button"
      type: "Gamepad::Button"
      idl_file: "idl/Gamepad.idl"
      id: 7
      field: btnState
    gamepad:
      to: button:x

  - name: coax_select
    dds:
      topic: "Gamepad_Button"
      type: "Gamepad::Button"
      idl_file: "idl/Gamepad.idl"
      id: 4
      field: btnState
    gamepad:
      to: dpad:left

  - name: main_gun_select
    dds:
      topic: "Gamepad_Button"
      type: "Gamepad::Button"
      idl_file: "idl/Gamepad.idl"
      id: 5
      field: btnState
    gamepad:
      to: dpad:right

  - name: zoom_12x
    dds:
      topic: "Gamepad_Button"
      type: "Gamepad::Button"
      idl_file: "idl/Gamepad.idl"
      id: 2
      field: btnState
    gamepad:
      to: dpad:up

  - name: zoom_3x
    dds:
      topic: "Gamepad_Button"
      type: "Gamepad::Button"
      idl_file: "idl/Gamepad.idl"
      id: 1
      field: btnState
    gamepad:
      to: dpad:down

  # -------- Analog / Stick (Turret) --------
  # Left/right turret movement from Stick_TwoAxis.x in [-110, 110]
  - name: turret_yaw
    dds:
      topic: "Gamepad_Stick_TwoAxis"
      type: "Gamepad::Stick_TwoAxis"
      idl_file: "idl/Gamepad.idl"
      id: 30
      field: x
      input_min: -110.0
      input_max: 110.0
    gamepad:
      to: axis:left_x
      scale: 1.0
      deadzone: 0.02
      invert: false

  # Turret up/down from two separate Gamepad_Analog sources (0..1)
  # Up should drive +LY, Down should drive -LY (invert Down).
  - name: turret_pitch_up
    dds:
      topic: "Gamepad_Analog"
      type: "Gamepad::Gamepad_Analog"
      idl_file: "idl/Gamepad.idl"
      id: 2
      field: value
    gamepad:
      to: axis:left_y
      scale: 1.0
      deadzone: 0.02
      invert: false

  - name: turret_pitch_down
    dds:
      topic: "Gamepad_Analog"
      type: "Gamepad::Gamepad_Analog"
      idl_file: "idl/Gamepad.idl"
      id: 1
      field: value
    gamepad:
      to: axis:left_y
      scale: 1.0
      deadzone: 0.02
      invert: true
