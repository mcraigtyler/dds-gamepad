
role:
  name: "Driver"
  yoke_id: 1004

mappings:
  - name: steering
    dds:
      topic: "Gamepad_Stick_TwoAxis"
      type: "Gamepad::Stick_TwoAxis"
      idl_file: "idl/Gamepad.idl"
      id: 30
      field: x
      input_min: -110.0
      input_max: 110.0
    gamepad:
      to: axis:right_x
      scale: 1.0
      deadzone: 0.02
      invert: false

  - name: throttle
    dds:
      topic: "Gamepad_Analog"
      type: "Gamepad::Gamepad_Analog"
      idl_file: "idl/Gamepad.idl"
      id: 2
      field: value
    gamepad:
      to: axis:right_trigger
      scale: 1.0
      deadzone: 0.05
      invert: false

  - name: brake
    dds:
      topic: "Gamepad_Analog"
      type: "Gamepad::Gamepad_Analog"
      idl_file: "idl/Gamepad.idl"
      id: 1
      field: value
    gamepad:
      to: axis:left_trigger
      scale: 1.0
      deadzone: 0.05
      invert: false
